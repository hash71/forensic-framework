services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: forensic
      POSTGRES_PASSWORD: forensic_secret
      POSTGRES_DB: forensic_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forensic"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"   # FastAPI
      - "8501:8501"   # Streamlit
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://forensic:forensic_secret@db:5432/forensic_db
      MODAL_ENDPOINT: ${MODAL_ENDPOINT:-}
      MODAL_TOKEN: ${MODAL_TOKEN:-}
      MODAL_MODEL: ${MODAL_MODEL:-fusion-brain}
    volumes:
      - ./data:/app/data
    command: >
      sh -c "
        python -m app.database &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        streamlit run dashboard.py --server.port 8501 --server.headless true --server.address 0.0.0.0 &
        wait
      "

volumes:
  pgdata:
